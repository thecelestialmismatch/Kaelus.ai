# ===== Kaelus AI Compliance Firewall =====
# Docker Compose for self-hosted deployment
# Run: docker compose up -d
# Access: http://localhost:3000

version: "3.9"

services:
  # Main application
  kaelus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaelus-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://YOUR-PROJECT-ID.supabase.co}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-your-anon-key}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-your-service-role-key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BYTEZ_API_KEY=${BYTEZ_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    labels:
      - "com.kaelus.description=AI Compliance Firewall"
      - "com.kaelus.version=1.0.0"
