version: "3.9"

services:
  kaelus-proxy:
    image: kaelus/proxy:latest
    # Uncomment to build locally instead:
    # build: .
    container_name: kaelus-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Required: your Kaelus license key from https://kaelus.online/dashboard
      KAELUS_LICENSE_KEY: ${KAELUS_LICENSE_KEY}
      # Required: your AI provider API key (the one your team normally uses)
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY}
      # Optional: openai | anthropic | google | openrouter  (default: openai)
      UPSTREAM_PROVIDER: ${UPSTREAM_PROVIDER:-openai}
      NODE_ENV: production
    volumes:
      # Persistent local event log — never leave your machine
      - kaelus-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kaelus-data:
    driver: local
