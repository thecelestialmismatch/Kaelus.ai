name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: compliance-firewall-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: compliance-firewall-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  compliance-guard:
    name: Compliance Pattern Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify 16+ CUI patterns present
        run: |
          COUNT=$(grep -c "category:" proxy/patterns/index.ts 2>/dev/null || echo 0)
          echo "Pattern categories found: $COUNT"
          if [ "$COUNT" -lt 16 ]; then
            echo "BLOCKED: CUI pattern count dropped below 16 (found: $COUNT)"
            echo "Compliance engine must never be degraded."
            exit 1
          fi
          echo "PASS: $COUNT CUI pattern categories verified"
