<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaelus AI Firewall — Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #07070b;
        color: #e8e8ef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        min-height: 100vh;
        padding: 32px 16px;
      }
      .page { max-width: 520px; margin: 0 auto; }
      header { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
      .brand { font-size: 18px; font-weight: 700; color: #c8a84b; }
      h2 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
      .card {
        background: #0d0d14;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .field { margin-bottom: 16px; }
      .field:last-child { margin-bottom: 0; }
      label { display: block; font-size: 13px; font-weight: 600; color: #c8c8d8; margin-bottom: 6px; }
      input[type="text"], input[type="url"] {
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 7px;
        padding: 9px 12px;
        color: #e8e8ef;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      input[type="text"]:focus, input[type="url"]:focus {
        border-color: #c8a84b;
      }
      .hint { font-size: 11px; color: #555; margin-top: 4px; }
      .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .checkbox-row:last-child { margin-bottom: 0; }
      input[type="checkbox"] { width: 15px; height: 15px; accent-color: #c8a84b; cursor: pointer; }
      .checkbox-row label { margin-bottom: 0; cursor: pointer; }
      .badge-pill {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 4px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .badge-critical { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
      .badge-high     { background: rgba(249,115,22,0.2); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
      .badge-medium   { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
      .save-btn {
        width: 100%;
        padding: 11px;
        background: #c8a84b;
        color: #07070b;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s;
        font-family: inherit;
      }
      .save-btn:hover { opacity: 0.9; }
      .save-btn:active { transform: scale(0.99); }
      .saved-msg { display: none; text-align: center; color: #4ade80; font-size: 13px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <span style="font-size:22px">🛡️</span>
        <span class="brand">Kaelus AI Firewall</span>
      </header>

      <h2>General</h2>
      <div class="card">
        <div class="field">
          <div class="checkbox-row">
            <input type="checkbox" id="enabled" checked />
            <label for="enabled">Enable AI Firewall</label>
          </div>
          <p class="hint">When disabled, prompts are not scanned.</p>
        </div>
      </div>

      <h2>Block on risk level</h2>
      <div class="card">
        <div class="field">
          <div class="checkbox-row">
            <input type="checkbox" id="block-critical" checked />
            <label for="block-critical"><span class="badge-pill badge-critical">Critical</span> — SSN, API keys, classified markings</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="block-high" checked />
            <label for="block-high"><span class="badge-pill badge-high">High</span> — CAGE codes, contract numbers, PHI</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="block-medium" />
            <label for="block-medium"><span class="badge-pill badge-medium">Medium</span> — Large source code blocks</label>
          </div>
        </div>
      </div>

      <h2>Kaelus API (optional)</h2>
      <div class="card">
        <div class="field">
          <label for="api-key">API Key</label>
          <input type="text" id="api-key" placeholder="kae_live_..." autocomplete="off" />
          <p class="hint">Connect to your Kaelus workspace for deep scanning and audit logging. Leave blank for local-only scanning.</p>
        </div>
        <div class="field">
          <label for="endpoint">Gateway Endpoint</label>
          <input type="url" id="endpoint" placeholder="https://kaelus.online/api/v1/scan" />
          <p class="hint">Override if you self-host the Kaelus gateway.</p>
        </div>
      </div>

      <button class="save-btn" id="save-btn">Save settings</button>
      <div class="saved-msg" id="saved-msg">✓ Settings saved</div>
    </div>

    <script>
      // Load saved settings
      chrome.storage.sync.get(
        { enabled: true, blockOnRisk: ["CRITICAL", "HIGH"], apiKey: "", endpoint: "https://kaelus.online/api/v1/scan" },
        (s) => {
          document.getElementById("enabled").checked = s.enabled;
          document.getElementById("block-critical").checked = s.blockOnRisk.includes("CRITICAL");
          document.getElementById("block-high").checked = s.blockOnRisk.includes("HIGH");
          document.getElementById("block-medium").checked = s.blockOnRisk.includes("MEDIUM");
          document.getElementById("api-key").value = s.apiKey || "";
          document.getElementById("endpoint").value = s.endpoint || "";
        }
      );

      document.getElementById("save-btn").addEventListener("click", () => {
        const blockOnRisk = [];
        if (document.getElementById("block-critical").checked) blockOnRisk.push("CRITICAL");
        if (document.getElementById("block-high").checked) blockOnRisk.push("HIGH");
        if (document.getElementById("block-medium").checked) blockOnRisk.push("MEDIUM");

        chrome.storage.sync.set({
          enabled: document.getElementById("enabled").checked,
          blockOnRisk,
          apiKey: document.getElementById("api-key").value.trim() || null,
          endpoint: document.getElementById("endpoint").value.trim() || "https://kaelus.online/api/v1/scan",
        }, () => {
          const msg = document.getElementById("saved-msg");
          msg.style.display = "block";
          setTimeout(() => { msg.style.display = "none"; }, 2000);
        });
      });
    </script>
  </body>
</html>
